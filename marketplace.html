<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace — Fur Nest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<nav class="fn-nav">
  <a href="index.html" class="fn-logo">🐾 Fur Nest</a>
  <div class="fn-nav-links">
    <a href="index.html" class="fn-nav-link">Feed</a>
    <a href="marketplace.html" class="fn-nav-link active">Marketplace</a>
  </div>
  <div id="nav-auth" class="nav-auth"></div>
</nav>

<header class="hero text-center text-white py-5">
  <h1 class="fw-bold display-5">Marketplace</h1>
  <p class="hero-sub">Pets, food, supplies, clothes and more</p>
  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <input id="searchBar" type="text" class="form-control form-control-lg rounded-pill hero-search"
               placeholder="Search listings…">
      </div>
    </div>

    <!-- Main tabs -->
    <div class="market-tabs mt-4">
      <button class="market-tab active" id="tabPets" data-tab="pets">🐾 Pets</button>
      <button class="market-tab" id="tabItems" data-tab="items">🛍 Items</button>
    </div>

    <!-- Pet filters (shown when Pets tab active) -->
    <div id="petFilters" class="mt-3 d-flex justify-content-center gap-2 flex-wrap">
      <button class="filter-btn active" data-type="all">All pets</button>
      <button class="filter-btn" data-type="dog">Dogs 🐕</button>
      <button class="filter-btn" data-type="cat">Cats 🐈</button>
      <button class="filter-btn" data-type="bird">Birds 🦜</button>
      <button class="filter-btn" data-type="rabbit">Rabbits 🐇</button>
      <button class="filter-btn" data-type="other">Other</button>
    </div>

    <!-- Item filters (shown when Items tab active) -->
    <div id="itemFilters" class="mt-3 d-flex justify-content-center gap-2 flex-wrap" style="display:none !important">
      <button class="filter-btn active" data-cat="all">All items</button>
      <button class="filter-btn" data-cat="food">🍖 Food</button>
      <button class="filter-btn" data-cat="care">🧴 Care</button>
      <button class="filter-btn" data-cat="clothes">👕 Clothes</button>
      <button class="filter-btn" data-cat="accessories">🎀 Accessories</button>
      <button class="filter-btn" data-cat="toys">🎾 Toys</button>
      <button class="filter-btn" data-cat="other">📦 Other</button>
    </div>

    <div class="mt-3 d-flex justify-content-center gap-2">
      <a href="add-pet.html" id="addPetBtn" class="add-pet-btn">+ List a pet</a>
      <a href="add-item.html" id="addItemBtn" class="add-pet-btn" style="display:none">+ List an item</a>
    </div>
  </div>
</header>

<div class="container my-5">
  <!-- Pets grid -->
  <div id="petsSection">
    <div id="petsLoading" class="row g-4">
      <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
      <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
      <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
    </div>
    <div id="petList" class="row g-4"></div>
  </div>

  <!-- Items grid -->
  <div id="itemsSection" style="display:none">
    <div id="itemsLoading" class="row g-4">
      <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
      <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
      <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
    </div>
    <div id="itemList" class="row g-4"></div>
  </div>
</div>

<footer class="fn-footer">🐾 Fur Nest &copy; 2025</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
