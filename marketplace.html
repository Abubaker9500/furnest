<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace — Fur Nest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<nav class="fn-nav">
  <a href="index.html" class="fn-logo">🐾 Fur Nest</a>
  <div class="fn-nav-links">
    <a href="index.html" class="fn-nav-link">Feed</a>
    <a href="marketplace.html" class="fn-nav-link">Marketplace</a>
  </div>
  <div id="nav-auth" class="nav-auth"></div>
</nav>

<div class="modal fade" id="petModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="modalName"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-4">
          <div class="col-md-5">
            <img id="modalImage" class="img-fluid rounded-3 w-100" style="height:320px;object-fit:cover" alt="">
          </div>
          <div class="col-md-7">
            <h4 id="modalBreed" class="text-muted fw-normal mb-1"></h4>
            <p id="modalLocation" class="mb-3 text-muted small"></p>
            <div class="row g-2 my-2">
              <div class="col-4"><div class="modal-stat"><small>Age</small><strong id="modalAge"></strong></div></div>
              <div class="col-4"><div class="modal-stat"><small>Gender</small><strong id="modalGender"></strong></div></div>
              <div class="col-4"><div class="modal-stat"><small>Type</small><strong id="modalType"></strong></div></div>
            </div>
            <span id="modalPrice" class="modal-price"></span>
            <h6 class="mt-3 mb-2">Health &amp; traits</h6>
            <ul id="modalHealth" class="modal-health-list"></ul>
            <button id="modalContactBtn" class="btn btn-primary mt-3 w-100">View Full Details</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<header class="hero text-center text-white py-5">
  <h1 class="fw-bold display-5">Pet Marketplace</h1>
  <p class="hero-sub">Adopt, buy, or give a loving pet a new home</p>
  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <input id="searchBar" type="text" class="form-control form-control-lg rounded-pill hero-search"
               placeholder="Search by name, breed, or location…">
      </div>
    </div>
    <div class="mt-3 d-flex justify-content-center gap-2 flex-wrap">
      <button class="filter-btn active" data-type="all">All pets</button>
      <button class="filter-btn" data-type="dog">Dogs 🐕</button>
      <button class="filter-btn" data-type="cat">Cats 🐈</button>
    </div>
    <div class="mt-3">
      <a href="add-pet.html" class="add-pet-btn">+ List a pet</a>
    </div>
  </div>
</header>

<div class="container my-5">
  <div id="petsLoading" class="row g-4">
    <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
    <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
    <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
    <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
    <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
    <div class="col-sm-6 col-lg-4"><div class="skeleton-pet-card"><span class="skeleton sk-pet-img"></span><div class="sk-pet-body"><span class="skeleton sk-line sk-w60"></span><span class="skeleton sk-line sk-w40"></span><span class="skeleton sk-line sk-w75"></span></div></div></div>
  </div>
  <div id="petList" class="row g-4"></div>
</div>

<footer class="fn-footer">🐾 Fur Nest &copy; 2025</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script type="module" src="js/app.js"></script>
</body>
</html>
