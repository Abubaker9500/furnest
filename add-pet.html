<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List a Pet — Fur Nest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<nav class="fn-nav">
  <a href="index.html" class="fn-logo">🐾 Fur Nest</a>
  <div class="fn-nav-links">
    <a href="index.html" class="fn-nav-link">Feed</a>
    <a href="marketplace.html" class="fn-nav-link">Marketplace</a>
  </div>
  <div id="nav-auth" class="nav-auth"></div>
</nav>

<header class="hero text-center text-white py-4">
  <h1 class="fw-bold h2">List a Pet</h1>
  <p class="mb-0 hero-sub">Fill in the details to create your listing</p>
</header>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">
      <div class="card shadow-sm p-4 rounded-4">
        <h3 class="text-center mb-4 form-title">Pet Information</h3>
        <form id="petForm">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Pet name *</label>
              <input type="text" id="name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Animal type</label>
              <select id="type" class="form-select">
                <option value="dog">Dog 🐕</option>
                <option value="cat">Cat 🐈</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Breed</label>
              <input type="text" id="breed" class="form-control" placeholder="e.g. Golden Retriever">
            </div>
            <div class="col-md-6">
              <label class="form-label">Age</label>
              <input type="text" id="age" class="form-control" placeholder="e.g. 2 years">
            </div>
            <div class="col-md-6">
              <label class="form-label">Gender</label>
              <select id="gender" class="form-select">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
              <input type="text" id="genderOther" class="form-control mt-2" placeholder="Specify gender (optional)" style="display:none">
            </div>
            <div class="col-md-6">
              <label class="form-label">Location</label>
              <input type="text" id="location" class="form-control" placeholder="City, State">
            </div>
          </div>

          <hr class="my-4">

          <label class="form-label fw-semibold">Listing type</label>
          <div class="listing-type-group mb-3">
            <label class="listing-type-opt">
              <input type="radio" name="listingTypeR" id="lt-adopt" value="adopt" checked>
              <span>🏠 For adoption</span>
            </label>
            <label class="listing-type-opt">
              <input type="radio" name="listingTypeR" id="lt-sell" value="sell">
              <span>💰 For sale</span>
            </label>
            <label class="listing-type-opt">
              <input type="radio" name="listingTypeR" id="lt-free" value="free">
              <span>🎁 Free</span>
            </label>
          </div>
          <input type="hidden" id="listingType" value="adopt">

          <div id="priceWrap" class="mb-3" style="display:none">
            <label class="form-label">Price (USD)</label>
            <input type="number" id="price" class="form-control" placeholder="0" min="0">
          </div>

          <hr class="my-4">

          <label class="form-label fw-semibold">Health &amp; traits</label>
          <div class="health-checks mb-3">
            <label class="health-check-opt"><input type="checkbox" name="health" value="Vaccinated"> Vaccinated</label>
            <label class="health-check-opt"><input type="checkbox" name="health" value="Neutered"> Neutered / spayed</label>
            <label class="health-check-opt"><input type="checkbox" name="health" value="Microchipped"> Microchipped</label>
            <label class="health-check-opt"><input type="checkbox" name="health" value="House-trained"> House-trained</label>
            <label class="health-check-opt"><input type="checkbox" name="health" value="Good with kids"> Good with kids</label>
            <label class="health-check-opt"><input type="checkbox" name="health" value="Good with pets"> Good with other pets</label>
          </div>
          <!-- Keep old vaccinated checkbox hidden for backward compat -->
          <input type="checkbox" id="vaccinated" style="display:none">

          <hr class="my-4">

          <label class="form-label fw-semibold">Photo</label>

          <div class="img-tabs">
            <button type="button" class="img-tab active" id="tabFile">Upload photo</button>
            <button type="button" class="img-tab" id="tabUrl">Paste URL</button>
          </div>

          <div id="filePane">
            <label class="upload-area" id="uploadArea">
              <input type="file" id="imageFile" accept="image/*" style="display:none">
              <div class="upload-area-inner">
                <span class="upload-icon">📷</span>
                <span class="upload-text">Click to choose a photo</span>
                <span class="upload-hint">JPG, PNG, WEBP — max 5MB</span>
              </div>
            </label>
            <p id="uploadStatus" class="upload-status" style="display:none"></p>
            <progress id="uploadProgress" value="0" max="100" class="upload-progress" style="display:none"></progress>
          </div>

          <div id="urlPane" style="display:none">
            <input type="url" id="imageUrl" class="form-control" placeholder="https://example.com/photo.jpg">
          </div>

          <img id="imagePreview" src="" alt="Preview" class="img-preview rounded-3 mt-2" style="display:none">
          <div id="currentImageWrap" style="display:none">
            <p class="form-text text-muted mt-1">Current photo shown above. Upload a new one to replace it.</p>
          </div>

          <button class="btn btn-primary w-100 mt-4 py-2" type="submit">Publish listing</button>
          <a href="index.html" class="btn btn-link w-100 mt-1">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>

<footer class="fn-footer">🐾 Fur Nest &copy; 2025</footer>



<script type="module" src="js/addPet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
